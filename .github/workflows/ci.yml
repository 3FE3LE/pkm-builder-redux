name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  CI: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'app/**'
              - 'components/**'
              - 'hooks/**'
              - 'lib/**'
              - 'tests/**'
              - 'scripts/**'
              - 'data/**'
              - 'public/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'next.config.*'
              - 'postcss.config.*'
              - 'tailwind.config.*'
              - '.github/workflows/ci.yml'

  typecheck:
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Skip typecheck when no relevant changes
        if: needs.changes.outputs.code != 'true'
        run: echo "No relevant code changes detected. Skipping typecheck."

      - name: Checkout
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install pnpm
        if: needs.changes.outputs.code == 'true'
        run: |
          npm install --global pnpm@10.30.0
          pnpm --version

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        if: needs.changes.outputs.code == 'true'
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Skip tests when no relevant changes
        if: needs.changes.outputs.code != 'true'
        run: echo "No relevant code changes detected. Skipping tests."

      - name: Checkout
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install pnpm
        if: needs.changes.outputs.code == 'true'
        run: |
          npm install --global pnpm@10.30.0
          pnpm --version

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: pnpm install --frozen-lockfile

      - name: Test
        if: needs.changes.outputs.code == 'true'
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Skip build when no relevant changes
        if: needs.changes.outputs.code != 'true'
        run: echo "No relevant code changes detected. Skipping build."

      - name: Checkout
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: needs.changes.outputs.code == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install pnpm
        if: needs.changes.outputs.code == 'true'
        run: |
          npm install --global pnpm@10.30.0
          pnpm --version

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: needs.changes.outputs.code == 'true'
        run: pnpm build
